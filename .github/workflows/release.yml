name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift run LMLTestRunner

      - name: Package app bundle
        run: |
          mkdir -p LML.app/Contents/MacOS
          mkdir -p LML.app/Contents/Resources
          cp .build/release/LML LML.app/Contents/MacOS/LML
          cp Sources/LML/Resources/Info.plist LML.app/Contents/
          cp Sources/LML/Resources/AppIcon.icns LML.app/Contents/Resources/ 2>/dev/null || true
          codesign -fs - LML.app
          zip -r LML-${{ github.ref_name }}-arm64.zip LML.app

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            LML-${{ github.ref_name }}-arm64.zip

      - name: Compute tap update
        run: |
          SHA=$(shasum -a 256 LML-${{ github.ref_name }}-arm64.zip | awk '{print $1}')
          echo ""
          echo "=== To update the Homebrew tap: ==="
          echo "#   sha256 → $SHA"
          echo "#   version → ${GITHUB_REF_NAME#v}"
