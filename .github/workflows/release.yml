name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --generate-notes

  update-tap:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(curl -sL "https://github.com/LinusOstlund/linus-markup-language/archive/refs/tags/${{ github.ref_name }}.tar.gz" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: LinusOstlund/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Patch formula
        run: |
          sed -i 's|archive/refs/tags/v[^"]*|archive/refs/tags/${{ github.ref_name }}.tar.gz|' Formula/lml.rb
          sed -i 's|sha256 ".*"|sha256 "${{ steps.sha.outputs.sha256 }}"|' Formula/lml.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/lml.rb
          git commit -m "chore: bump lml to ${{ github.ref_name }}"
          git push
