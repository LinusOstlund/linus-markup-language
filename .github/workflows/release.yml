name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift run LMLTestRunner

      - name: Package binary
        run: |
          cp .build/release/LML ./LML
          codesign -fs - ./LML
          tar czf LML-${{ github.ref_name }}-arm64.tar.gz LML

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            LML-${{ github.ref_name }}-arm64.tar.gz

      - name: Compute tap formula update
        id: sha
        run: |
          SHA=$(curl -sL "https://github.com/LinusOstlund/linus-markup-language/archive/refs/tags/${{ github.ref_name }}.tar.gz" | shasum -a 256 | awk '{print $1}')
          echo ""
          echo "=== To update the Homebrew tap, run: ==="
          echo "cd /path/to/homebrew-tap"
          echo "# Update Formula/lml.rb:"
          echo "#   url → .../archive/refs/tags/${{ github.ref_name }}.tar.gz"
          echo "#   sha256 → $SHA"
          echo "git commit -am 'chore: bump lml to ${{ github.ref_name }}' && git push"
